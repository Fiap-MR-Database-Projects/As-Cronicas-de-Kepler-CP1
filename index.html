<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="./script.js" defer></script>

<title>Mercado Interestelar</title>
</head>

<body class="bg-slate-900 text-slate-200 p-4">

<h1 class="text-3xl font-bold">Mercado Interestelar</h1>
<span>Monitoramento de ativos da colônia Kepler-186f</span>

<main class="mt-6 grid gap-4  lg:items-start">

<!-- FORM EVENTO -->
<section class="rounded-lg border border-slate-700 bg-slate-800 p-4">

<h2 class="text-xl font-semibold mb-3">Processar Evento</h2>

<form id="evento-form" class="flex items-end gap-4">

<div>
<label class="block text-sm mb-1">Evento</label>

<select id="evento" class=" rounded border border-slate-600 bg-slate-900 px-3 py-2">
<option value="RADIACAO">RADIACAO</option>
<option value="DESCOBERTA_MINA">DESCOBERTA_MINA</option>
</select>
</div>

<div>
<label class="block text-sm mb-1">Setor</label>

<select id="setor" class=" rounded border border-slate-600 bg-slate-900 px-3 py-2">
<option value="MINERAL">MINERAL</option>
<option value="COMBUSTIVEL">COMBUSTIVEL</option>
<option value="DADOS">DADOS</option>
</select>
</div>

<div>
<label class="block text-sm mb-1">Percentual</label>

<input
id="percentual"
type="number"
required
class=" rounded border border-slate-600 bg-slate-900 px-3 py-2"
/>
</div>

<button
type="submit"
class="w-1/5 rounded bg-blue-600 px-3 py-2 font-medium hover:bg-blue-500"
>
Executar Evento
</button>

</form>

<p id="form-message" class="mt-3 text-sm"></p>

</section>


<!-- TABELA ATIVOS -->
<section class="rounded-lg border border-slate-700 bg-slate-800 p-4">

<h2 class="text-xl font-semibold mb-3">Ativos Galácticos</h2>

<div class="overflow-x-auto">

<table class="min-w-full border border-slate-700 text-sm">

<thead class="bg-slate-700 text-slate-200">
<tr>
<th class="px-3 py-2 border border-slate-600">ID</th>
<th class="px-3 py-2 border border-slate-600">Nome</th>
<th class="px-3 py-2 border border-slate-600">Setor</th>
<th class="px-3 py-2 border border-slate-600">Preço Base</th>
<th class="px-3 py-2 border border-slate-600">Estoque</th>
</tr>
</thead>

<tbody id="ativos-list" class="bg-slate-900">

<tr>
<td colspan="4" class="text-center p-3 text-slate-400">
Carregando ativos...
</td>
</tr>

</tbody>

</table>

</div>

</section>

</main>

</body>
</html>
